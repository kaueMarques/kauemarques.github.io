name: ARTICLE CREATION - GH ACTION SCRIPT

on:
  issues:
    types: [closed, edited]

jobs:
  create-page:
    if: github.event.issue.user.login == 'kaueMarques'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Process Issue
        id: process_issue
        run: |
          issue_number=${{ github.event.issue.number }}
          state="${{ github.event.issue.state }}"
          state_reason="${{ github.event.issue.state_reason }}"
          action="${{ github.event.action }}"

          # Requirement: Only create if closed as completed.
          # If edited, only update if it is already closed.
          if [ "$action" == "closed" ] && [ "$state_reason" != "completed" ]; then
            echo "Issue closed but not completed. Skipping."
            exit 0
          fi

          if [ "$action" == "edited" ] && [ "$state" != "closed" ]; then
            echo "Issue edited but not closed. Skipping."
            exit 0
          fi

          title="${{ github.event.issue.title }}"
          body="${{ github.event.issue.body }}"

          # Check for 'delete' label to archive
          is_deleted=false
          labels_json=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${issue_number}/labels")
          if echo "$labels_json" | jq -r '.[].name' | grep -q "^delete$"; then
            is_deleted=true
          fi

          # Sanitize title for filename
          sanitized_title=$(echo "${title}" | sed 's/[^a-zA-Z0-9]/-/g' | tr -s '-' | sed 's/^-//;s/-$//')

          # Find existing file for this issue number
          existing_file=$(find src/content/post -name "*-#${issue_number}.md" | head -n 1)

          if [ -n "$existing_file" ]; then
            filename="$existing_file"
            date=$(basename "$existing_file" | cut -d'-' -f1-3)
          else
            date=$(date -u +"%Y-%m-%d")
            filename="src/content/post/${date}-${sanitized_title}-#${issue_number}.md"
          fi

          # Create frontmatter description
          description=$(echo "$body" | sed 's/[#*`_]//g' | tr -d '\n' | cut -c1-100 | sed 's/"/'"'"'/g')

          # Set draft status
          draft_status="false"
          if [ "$is_deleted" = true ]; then
            draft_status="true"
          fi

          cat <<EOF > "$filename"
---
title: "${title}"
description: "${description}..."
publishDate: "${date}"
draft: ${draft_status}
tags:
  - gh-action
---

${body}
EOF
          echo "filename=$filename" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add src/content/post/
          git commit -m "feat: post from issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

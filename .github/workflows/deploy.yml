name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Número da issue para notificar'
        required: false
        type: string
      operation:
        description: 'Operação realizada'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Notificar Issue
        if: ${{ github.event.inputs.issue_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          OPERATION: ${{ github.event.inputs.operation }}
        run: |
          if [[ "$OPERATION" == "deletar" ]]; then
            gh issue comment $ISSUE_NUMBER --repo ${{ github.repository }} --body "🚀 Deploy finalizado! A exclusão foi refletida no site."
          else
            gh issue comment $ISSUE_NUMBER --repo ${{ github.repository }} --body "🚀 Deploy finalizado com sucesso! Acesse seu post em: https://kauemarques.github.io/posts/postid-$ISSUE_NUMBER/"
            gh issue edit $ISSUE_NUMBER --repo ${{ github.repository }} --add-label "publicado" || true
          fi

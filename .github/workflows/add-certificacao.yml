name: GH - Adicionar Certificação

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  add-cert:
    if: contains(github.event.issue.labels.*.name, 'certificacao') && github.actor == 'kaueMarques' && github.event.issue.user.login == 'kaueMarques'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Ler dados da Issue e atualizar JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -c "
          import os, json, re, sys
          
          body = os.environ.get('ISSUE_BODY', '')
          path = 'src/data/certificacoes.json'
          
          def extract_section(header):
              pattern = re.compile(f'### \s*{header}\s*\n+([\s\S]*?)(?:\n### |$)', re.IGNORECASE)
              match = pattern.search(body)
              if match:
                  val = match.group(1).strip()
                  if val == '_No response_': return None
                  return val
              return None
          
          name = extract_section(r'Nome da Certificação')
          image = extract_section(r'URL da Imagem \(Badge\)')
          link = extract_section(r'Link de Validação')
          description = extract_section(r'Descrição Resumida')
          
          if not name or not image or not description:
              print('Erro: Campos obrigatórios ausentes na issue.')
              sys.exit(1)
          
          with open(path, 'r', encoding='utf-8') as f:
              certs = json.load(f)
          
          certs.append({'image': image, 'link': link, 'name': name, 'description': description})
          
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(certs, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "
            
      - name: Commit e Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/certificacoes.json
          git commit -m "feat: adiciona certificação via issue #${{ github.event.issue.number }}"
          git pull origin $(git branch --show-current) --rebase
          git push
          
          gh workflow run deploy.yml
          gh issue comment ${{ github.event.issue.number }} --body "✅ Certificação adicionada com sucesso! O deploy para o site já foi iniciado."
          gh issue close ${{ github.event.issue.number }} --reason "completed"
name: GH - GERENCIA BLOG

on:
  issues:
    types: [opened, edited, labeled, unlabeled, deleted, closed, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: "issue-to-post"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  manage_post:
    if: github.actor == 'kaueMarques'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Processar Issue e Gerar Post
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_DATE: ${{ github.event.issue.created_at }}
          ACTION_TYPE: ${{ github.event.action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          STATE_REASON: ${{ github.event.issue.state_reason }}
          LABEL_NAME: ${{ github.event.label.name }}
          LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          FILE_PATH="src/content/post/issue-${ISSUE_NUMBER}.md"
          
          # Verifica se as tags existem na issue
          HAS_POSTED_LABEL=$(echo "$LABELS" | grep -i '"post"' || true)
          HAS_EDITAR_LABEL=$(echo "$LABELS" | grep -i '"editar"' || true)
          OPERATION=""
          
          # 1. Determina a ação com base nos gatilhos
          if [[ "$ACTION_TYPE" == "deleted" ]] || [[ "$ACTION_TYPE" == "unlabeled" && "$LABEL_NAME" == "post" ]] || [[ "$ACTION_TYPE" == "created" && "$COMMENT_BODY" == *'$rm'* ]] || [[ "$ACTION_TYPE" == "labeled" && "$LABEL_NAME" == "exclusao" ]]; then
            OPERATION="deletar"
          elif [[ "$ACTION_TYPE" == "closed" && "$STATE_REASON" == "completed" ]] || [[ "$ACTION_TYPE" == "opened" && -n "$HAS_POSTED_LABEL" ]] || [[ "$ACTION_TYPE" == "labeled" && "$LABEL_NAME" == "post" ]]; then
            OPERATION="postar"
          elif [[ "$ACTION_TYPE" == "reopened" ]] || [[ "$ACTION_TYPE" == "labeled" && "$LABEL_NAME" == "editar" ]] || [[ "$ACTION_TYPE" == "edited" && (-n "$HAS_POSTED_LABEL" || -n "$HAS_EDITAR_LABEL") ]]; then
            OPERATION="editar"
          else
            echo "Nenhuma ação mapeada para este fluxo. Ignorando."
            exit 0
          fi
          
          # 2. Comentário inicial na Issue
          if [[ "$ACTION_TYPE" != "deleted" ]]; then
            gh issue comment $ISSUE_NUMBER --body "⏳ Processando post... Ação em execução: **$OPERATION**" || true
          fi
          
          # 3. Atualiza estado e labels na interface do GitHub
          if [[ "$ACTION_TYPE" == "created" && "$COMMENT_BODY" == *'$rm'* ]]; then
            gh issue delete $ISSUE_NUMBER --yes || {
              gh issue reopen $ISSUE_NUMBER || true
              gh issue edit $ISSUE_NUMBER --add-label "arquivado" --remove-label "post,editar" || true
              gh issue close $ISSUE_NUMBER --reason "not planned"
            }
          elif [[ "$ACTION_TYPE" == "labeled" && "$LABEL_NAME" == "exclusao" ]]; then
            gh issue reopen $ISSUE_NUMBER || true
            gh issue edit $ISSUE_NUMBER --add-label "arquivado" --remove-label "exclusao" || true
            gh issue close $ISSUE_NUMBER --reason "not planned"
          elif [[ "$ACTION_TYPE" == "closed" && "$STATE_REASON" == "completed" ]]; then
            gh issue edit $ISSUE_NUMBER --add-label "post" --remove-label "editar" || true
          elif [[ "$ACTION_TYPE" == "reopened" ]]; then
            gh issue edit $ISSUE_NUMBER --add-label "editar" --remove-label "arquivado" || true
          elif [[ "$ACTION_TYPE" == "labeled" && "$LABEL_NAME" == "editar" ]]; then
            gh issue edit $ISSUE_NUMBER --remove-label "editar" || true
          elif [[ "$ACTION_TYPE" == "edited" && (-n "$HAS_POSTED_LABEL" || -n "$HAS_EDITAR_LABEL") ]]; then
            gh issue reopen $ISSUE_NUMBER || true
            gh issue edit $ISSUE_NUMBER --add-label "editar" || true
          fi

          # 4. Cria, edita ou deleta o arquivo na pasta do blog localmente
          if [[ "$OPERATION" == "deletar" ]]; then
            rm -f "$FILE_PATH"
          else
            mkdir -p src/content/post
            SAFE_TITLE="${ISSUE_TITLE//\"/\\\"}"
            {
              echo "---"
              echo "title: \"${SAFE_TITLE}\""
              echo "description: \"Post gerado a partir da issue #${ISSUE_NUMBER}\""
              echo "publishDate: \"${ISSUE_DATE}\""
              echo "tags: [\"issue\", \"github\"]"
              echo "---"
              echo ""
              printf "%s\n" "$ISSUE_BODY"
            } > "$FILE_PATH"
          fi
          
          # 5. Comita as alterações e faz o push
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE_PATH"
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: $OPERATION post gerado pela issue #${ISSUE_NUMBER}"
            git push
            
            # Aciona a esteira de deploy
            gh workflow run deploy.yml
            
            # 6. Comentário final na Issue informando que funcionou
            if [[ "$ACTION_TYPE" != "deleted" ]]; then
              if [[ "$OPERATION" == "deletar" ]]; then
                gh issue comment $ISSUE_NUMBER --body "🗑️ Post excluído com sucesso do blog! O deploy foi iniciado." || true
              elif [[ "$OPERATION" == "editar" ]]; then
                gh issue comment $ISSUE_NUMBER --body "✏️ Post atualizado com sucesso! O deploy foi iniciado." || true
                if [[ "$ACTION_TYPE" == "edited" ]]; then
                  gh issue edit $ISSUE_NUMBER --add-label "post" --remove-label "editar" || true
                  gh issue close $ISSUE_NUMBER --reason "completed" || true
                fi
              else
                gh issue comment $ISSUE_NUMBER --body "✅ Post gerado com sucesso! O deploy foi iniciado." || true
              fi
            fi
          else
            echo "O conteúdo é idêntico. Nenhuma mudança para comitar."
            if [[ "$ACTION_TYPE" != "deleted" ]]; then
              gh issue comment $ISSUE_NUMBER --body "⚠️ Nenhuma mudança detectada. O conteúdo do post já estava atualizado." || true
              if [[ "$ACTION_TYPE" == "edited" ]]; then
                gh issue edit $ISSUE_NUMBER --add-label "post" --remove-label "editar" || true
                gh issue close $ISSUE_NUMBER --reason "completed" || true
              fi
            fi
          fi
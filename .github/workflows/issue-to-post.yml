name: GH - GERENCIA BLOG

on:
  issues:
    types: [opened, edited, labeled, unlabeled, deleted, closed, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: "issue-to-post"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  manage_post:
    if: github.actor == 'kaueMarques' && github.event.issue.user.login == 'kaueMarques'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: = ACTION GERENCIAMENTO DE POSTAGENS E EVENTOS =
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_DATE: ${{ github.event.issue.created_at }}
          ACTION_TYPE: ${{ github.event.action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          STATE_REASON: ${{ github.event.issue.state_reason }}
          LABEL_NAME: ${{ github.event.label.name }}
          LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: bash src/manage-post.sh